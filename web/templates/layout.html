{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}} — LoadForge</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">
          <svg viewBox="0 0 44 44" fill="none" width="32" height="32">
            <rect width="44" height="44" rx="9" fill="#111111"/>
            <rect x="6"  y="34" width="7" height="6"  rx="1.5" fill="#4ade80" opacity="0.35"/>
            <rect x="16" y="26" width="7" height="14" rx="1.5" fill="#4ade80" opacity="0.65"/>
            <rect x="26" y="20" width="7" height="20" rx="1.5" fill="#4ade80"/>
            <polygon points="33,3 27,12 30,12 26,19 32,11 29,11" fill="white"/>
          </svg>
        </span>
        <span class="brand-name">LoadForge</span>
      </div>

      <nav class="sidebar-nav">
        <a href="/" class="nav-item {{if eq .ActiveNav "home"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
          <span>Home</span>
        </a>
        <a href="/history" class="nav-item {{if eq .ActiveNav "history"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </span>
          <span>History</span>
        </a>
        <a href="/threshold-settings" class="nav-item {{if eq .ActiveNav "threshold-settings"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </span>
          <span>SLA Thresholds</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <span class="sidebar-version">v0.1.0</span>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title">{{.Title}}</h1>
        </div>
        <div class="topbar-right">
          <div class="user-menu" id="user-menu">
            <button class="user-badge" id="user-menu-trigger" aria-haspopup="true" aria-expanded="false">
              <span class="user-avatar">{{slice .Username 0 1}}</span>
              <span>{{.Username}}</span>
              <svg class="user-chevron" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </button>
            <div class="user-dropdown" id="user-dropdown" role="menu">
              <a href="/settings" class="user-dropdown-item" role="menuitem">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Settings
              </a>
              <div class="user-dropdown-divider"></div>
              <a href="/logout" class="user-dropdown-item user-dropdown-danger" role="menuitem">
                <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Logout
              </a>
            </div>
          </div>
        </div>
      </header>

      <main class="content">
        {{block "content" .}}{{end}}
      </main>
    </div>

  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
