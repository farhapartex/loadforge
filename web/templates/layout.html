{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}} — LoadForge</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </span>
        <span class="brand-name">LoadForge</span>
      </div>

      <nav class="sidebar-nav">
        <a href="/" class="nav-item {{if eq .ActiveNav "home"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
          <span>Home</span>
        </a>
        <a href="/run" class="nav-item {{if eq .ActiveNav "run"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
          </span>
          <span>Run Test</span>
        </a>
        <a href="/history" class="nav-item {{if eq .ActiveNav "history"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </span>
          <span>History</span>
        </a>
        <a href="/settings" class="nav-item {{if eq .ActiveNav "settings"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </span>
          <span>Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <span class="sidebar-version">v0.1.0</span>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title">{{.Title}}</h1>
        </div>
        <div class="topbar-right">
          <div class="user-badge">
            <span class="user-avatar">{{slice .Username 0 1}}</span>
            <span>{{.Username}}</span>
          </div>
          <a href="/logout" class="btn btn-outline btn-sm">Logout</a>
        </div>
      </header>

      <main class="content">
        {{block "content" .}}{{end}}
      </main>
    </div>

  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
