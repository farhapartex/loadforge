{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.Title}} — LoadForge</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div class="app">

    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">
          <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
        </span>
        <span class="brand-name">LoadForge</span>
      </div>

      <nav class="sidebar-nav">
        <a href="/" class="nav-item {{if eq .ActiveNav "home"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
          <span>Home</span>
        </a>
        <a href="/run" class="nav-item {{if eq .ActiveNav "run"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
          </span>
          <span>Run Test</span>
        </a>
        <a href="/history" class="nav-item {{if eq .ActiveNav "history"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </span>
          <span>History</span>
        </a>
        <a href="/threshold-settings" class="nav-item {{if eq .ActiveNav "threshold-settings"}}active{{end}}">
          <span class="nav-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
          </span>
          <span>SLA Thresholds</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <span class="sidebar-version">v0.1.0</span>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title">{{.Title}}</h1>
        </div>
        <div class="topbar-right">
          <div class="user-badge">
            <span class="user-avatar">{{slice .Username 0 1}}</span>
            <span>{{.Username}}</span>
          </div>
          <a href="/logout" class="btn btn-outline btn-sm">Logout</a>
        </div>
      </header>

      <main class="content">
        {{block "content" .}}{{end}}
      </main>
    </div>

  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
