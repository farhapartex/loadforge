{{define "login"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — LoadForge</title>
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-brand">
        <div class="login-brand-icon">
          <svg viewBox="0 0 44 44" fill="none" width="32" height="32">
            <rect x="6"  y="34" width="7" height="6"  rx="1.5" fill="#4ade80" opacity="0.45"/>
            <rect x="16" y="26" width="7" height="14" rx="1.5" fill="#4ade80" opacity="0.72"/>
            <rect x="26" y="20" width="7" height="20" rx="1.5" fill="#4ade80"/>
            <polygon points="33,3 27,12 30,12 26,19 32,11 29,11" fill="white"/>
          </svg>
        </div>
        <h1>LoadForge</h1>
        <p>Load Testing Platform</p>
      </div>

      {{if .Error}}
      <div class="alert alert-error">
        <svg viewBox="0 0 24 24" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{.Error}}
      </div>
      {{end}}

      <form method="POST" action="/login" autocomplete="on">
        <div class="form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Enter your username"
            autocomplete="username"
            required
            autofocus
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
      </form>
    </div>
  </div>
  <script src="/static/js/app.js"></script>
</body>
</html>
{{end}}
