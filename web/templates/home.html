{{define "content"}}
<div class="quick-actions">
  <button class="btn btn-primary" id="btn-run-test">Run New Test</button>
  <a href="/history" class="btn btn-outline">View History</a>
</div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-label">Total Runs</div>
    <div class="stat-value">{{.Data.TotalRuns}}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Last Status</div>
    <div class="stat-value stat-status-{{.Data.LastStatus}}">{{.Data.LastStatus}}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Last Run</div>
    <div class="stat-value stat-secondary">{{.Data.LastRunAt}}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Active Tests</div>
    <div class="stat-value">{{.Data.ActiveTests}}</div>
  </div>
</div>

<div class="log-section">
  <div class="log-header">
    <span class="log-title">Activity Log</span>
    <button class="btn btn-sm btn-outline" id="btn-clear-log">Clear</button>
  </div>
  <div class="log-output" id="log-output">
    <div class="log-empty">Waiting for activity...</div>
  </div>
</div>

<div class="modal-overlay" id="modal-run-test" role="dialog" aria-modal="true" aria-labelledby="modal-run-title">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-run-title">Run New Test</h3>
      <button class="modal-close" id="btn-modal-close" aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label for="input-api-doc-url">
          API Doc URL <span class="required">*</span>
        </label>
        <input
          type="url"
          id="input-api-doc-url"
          name="api_doc_url"
          placeholder="https://api.example.com/openapi.json"
          required
        />
      </div>
      <div class="form-group">
        <label for="input-jwt-token">
          API JWT Token
          <span class="field-optional">(optional)</span>
        </label>
        <input
          type="text"
          id="input-jwt-token"
          name="jwt_token"
          placeholder="eyJhbGciOiJIUzI1NiIs..."
        />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="btn-modal-cancel">Cancel</button>
      <button class="btn btn-primary" id="btn-modal-submit">Start Test</button>
    </div>
  </div>
</div>
{{end}}
