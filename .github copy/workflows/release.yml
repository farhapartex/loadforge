name: Build and Release to GCS

on:
  push:
    branches: [main, stage, prod_gcp]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0). Defaults to git commit SHA.'
        required: false
        default: ''
      environment:
        description: 'Target environment (main, stage, prod_gcp)'
        required: true
        default: 'main'
        type: choice
        options:
          - main
          - stage
          - prod_gcp

env:
  GO_VERSION: '1.26'
  GCS_BUCKET: ${{ secrets.GCS_BUCKET }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: go test -race -short ./...

  build:
    name: Build (${{ matrix.agent_type }})
    runs-on: ubuntu-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        agent_type: [network, api, fullstack]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Download dependencies
        run: go mod download

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --exact-match 2>/dev/null \
              || git rev-parse --short HEAD 2>/dev/null \
              || echo "dev")
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set platform endpoints
        id: endpoints
        run: |
          # Determine environment from branch or workflow_dispatch input
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="main"
          elif [[ "${{ github.ref }}" == "refs/heads/stage" ]]; then
            ENV="stage"
          elif [[ "${{ github.ref }}" == "refs/heads/prod_gcp" ]]; then
            ENV="prod_gcp"
          else
            ENV="stage"
          fi

          case "${ENV}" in
            main)
              echo "api_endpoint=https://backend-pentest.virtualsme.me" >> $GITHUB_OUTPUT
              echo "ws_endpoint=wss://backend-pentest.virtualsme.me/api/v1/ws/agent" >> $GITHUB_OUTPUT
              ;;
            stage)
              echo "api_endpoint=https://stage-backend-pentest.virtualsme.me" >> $GITHUB_OUTPUT
              echo "ws_endpoint=wss://stage-backend-pentest.virtualsme.me/api/v1/ws/agent" >> $GITHUB_OUTPUT
              ;;
            prod_gcp)
              echo "api_endpoint=https://backend-pentest.virtualsme.me" >> $GITHUB_OUTPUT
              echo "ws_endpoint=wss://backend-pentest.virtualsme.me/api/v1/ws/agent" >> $GITHUB_OUTPUT
              ;;
          esac

          echo "environment=${ENV}" >> $GITHUB_OUTPUT

      - name: Install packaging tools
        run: sudo apt-get install -y zip nsis dpkg-dev rpm

      - name: Make scripts executable
        run: chmod +x scripts/build-release.sh scripts/build-installers.sh

      - name: Build release packages
        run: make release AGENT_TYPE=${{ matrix.agent_type }} VERSION=${{ steps.version.outputs.version }} API_ENDPOINT=${{ steps.endpoints.outputs.api_endpoint }} WS_ENDPOINT=${{ steps.endpoints.outputs.ws_endpoint }}

      - name: Upload installer packages
        uses: actions/upload-artifact@v4
        with:
          name: installer-packages-${{ matrix.agent_type }}-${{ steps.endpoints.outputs.environment }}
          path: |
            dist/${{ matrix.agent_type }}/*.deb
            dist/${{ matrix.agent_type }}/*.rpm
            dist/${{ matrix.agent_type }}/*.zip
            dist/${{ matrix.agent_type }}/checksums.sha256
          retention-days: 7
          # Note: .pkg files are uploaded separately by the build-macos-pkg job
          # which runs on macos-latest where pkgbuild/productbuild are available.

  build-macos-pkg:
    name: Build macOS .pkg (${{ matrix.agent_type }})
    runs-on: macos-latest
    needs: test

    strategy:
      fail-fast: false
      matrix:
        agent_type: [network, api, fullstack]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Download dependencies
        run: go mod download

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --exact-match 2>/dev/null \
              || git rev-parse --short HEAD 2>/dev/null \
              || echo "dev")
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set platform endpoints
        id: endpoints
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="main"
          elif [[ "${{ github.ref }}" == "refs/heads/stage" ]]; then
            ENV="stage"
          elif [[ "${{ github.ref }}" == "refs/heads/prod_gcp" ]]; then
            ENV="prod_gcp"
          else
            ENV="stage"
          fi
          case "${ENV}" in
            main)
              echo "api_endpoint=https://backend-pentest.virtualsme.me" >> $GITHUB_OUTPUT
              echo "ws_endpoint=wss://backend-pentest.virtualsme.me/api/v1/ws/agent" >> $GITHUB_OUTPUT
              ;;
            stage)
              echo "api_endpoint=https://stage-backend-pentest.virtualsme.me" >> $GITHUB_OUTPUT
              echo "ws_endpoint=wss://stage-backend-pentest.virtualsme.me/api/v1/ws/agent" >> $GITHUB_OUTPUT
              ;;
            prod_gcp)
              echo "api_endpoint=https://backend-pentest.virtualsme.me" >> $GITHUB_OUTPUT
              echo "ws_endpoint=wss://backend-pentest.virtualsme.me/api/v1/ws/agent" >> $GITHUB_OUTPUT
              ;;
          esac
          echo "environment=${ENV}" >> $GITHUB_OUTPUT

      - name: Make scripts executable
        run: chmod +x scripts/build-release.sh scripts/build-installers.sh

      - name: Build macOS amd64 and arm64 binaries
        run: |
          mkdir -p dist/${{ matrix.agent_type }}
          VERSION=${{ steps.version.outputs.version }}
          GIT_COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          GO_VERSION=$(go version | awk '{print $3}')
          MODULE="github.com/virtualfusion/virtualsme-be-pentest-agent"
          LDFLAGS="-s -w \
            -X '${MODULE}/internal/constants.Version=${VERSION}' \
            -X '${MODULE}/internal/constants.GitCommit=${GIT_COMMIT}' \
            -X '${MODULE}/internal/constants.BuildTime=${BUILD_TIME}' \
            -X '${MODULE}/internal/constants.GoVersion=${GO_VERSION}' \
            -X '${MODULE}/internal/constants.AgentType=${{ matrix.agent_type }}' \
            -X '${MODULE}/internal/constants.APIEndpoint=${{ steps.endpoints.outputs.api_endpoint }}' \
            -X '${MODULE}/internal/constants.WSEndpoint=${{ steps.endpoints.outputs.ws_endpoint }}'"
          for ARCH in amd64 arm64; do
            GOOS=darwin GOARCH=${ARCH} CGO_ENABLED=0 \
              go build -trimpath -ldflags "${LDFLAGS}" \
              -o "dist/${{ matrix.agent_type }}/pentest-agent-macos-${ARCH}" \
              ./cmd/agent
            echo "  Built macos/${ARCH}"
          done

      - name: Build macOS .pkg installers
        run: |
          AGENT_TYPE=${{ matrix.agent_type }} \
          VERSION=${{ steps.version.outputs.version }} \
          API_ENDPOINT=${{ steps.endpoints.outputs.api_endpoint }} \
          WS_ENDPOINT=${{ steps.endpoints.outputs.ws_endpoint }} \
          ./scripts/build-installers.sh

      - name: Upload macOS .pkg artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg-${{ matrix.agent_type }}-${{ steps.endpoints.outputs.environment }}
          path: dist/${{ matrix.agent_type }}/virtualsme-pentest-agent-${{ matrix.agent_type }}-macos.pkg
          retention-days: 7

  upload-to-gcs:
    name: Upload to GCS
    runs-on: ubuntu-latest
    needs: [build, build-macos-pkg]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="main"
          elif [[ "${{ github.ref }}" == "refs/heads/stage" ]]; then
            ENV="stage"
          elif [[ "${{ github.ref }}" == "refs/heads/prod_gcp" ]]; then
            ENV="prod_gcp"
          else
            ENV="stage"
          fi
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          # GCS folder: main and prod_gcp both release to the "prod" folder
          case "${ENV}" in
            main|prod_gcp) FOLDER="prod" ;;
            *)             FOLDER="${ENV}" ;;
          esac
          echo "folder=${FOLDER}" >> $GITHUB_OUTPUT

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git describe --tags --exact-match 2>/dev/null \
              || git rev-parse --short HEAD 2>/dev/null \
              || echo "dev")
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: false

      # --- AWS CLI S3-compatible upload (commented out: SignatureDoesNotMatch issues with GCS S3 interop) ---
      # - name: Configure AWS CLI for GCS (S3-compatible)
      #   run: |
      #     aws configure set aws_access_key_id ${{ secrets.GCS_ACCESS_KEY_ID }}
      #     aws configure set aws_secret_access_key ${{ secrets.GCS_SECRET_ACCESS_KEY }}
      #     aws configure set default.region auto
      #
      # - name: Upload to GCS and generate manifest
      #   run: |
      #     GCS_ENDPOINT="https://storage.googleapis.com"
      #     for FILE in "${SRC_DIR}"/*; do
      #       aws s3 cp "${FILE}" "s3://${{ env.GCS_BUCKET }}/${VERSIONED_PATH}/${FILENAME}" \
      #         --endpoint-url "${GCS_ENDPOINT}"
      #       aws s3 cp "${FILE}" "s3://${{ env.GCS_BUCKET }}/${LATEST_PATH}/${FILENAME}" \
      #         --endpoint-url "${GCS_ENDPOINT}"
      #     done
      #     aws s3 cp "manifest-${AGENT_TYPE}.json" \
      #       "s3://${{ env.GCS_BUCKET }}/${VERSIONED_PATH}/manifest.json" \
      #       --endpoint-url "${GCS_ENDPOINT}"
      #     aws s3 cp "manifest-${AGENT_TYPE}.json" \
      #       "s3://${{ env.GCS_BUCKET }}/${LATEST_PATH}/manifest.json" \
      #       --endpoint-url "${GCS_ENDPOINT}"
      # --- end AWS CLI block ---

      - name: Configure gsutil with HMAC keys
        run: |
          cat > ~/.boto << EOF
          [Credentials]
          gs_access_key_id = ${{ secrets.GCS_ACCESS_KEY_ID }}
          gs_secret_access_key = ${{ secrets.GCS_SECRET_ACCESS_KEY }}
          EOF

      - name: Upload to GCS and generate manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ENV="${{ steps.env.outputs.environment }}"
          FOLDER="${{ steps.env.outputs.folder }}"
          RELEASED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GIT_COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")"

          echo "Uploading to GCS: ${FOLDER}/releases/${VERSION}/"
          echo "Artifacts found:"
          find artifacts -type f | sort

          for AGENT_TYPE in network api fullstack; do
            SRC_DIR="artifacts/installer-packages-${AGENT_TYPE}-${ENV}"
            PKG_DIR="artifacts/macos-pkg-${AGENT_TYPE}-${ENV}"

            if [ ! -d "${SRC_DIR}" ]; then
              echo "No artifacts for agent type: ${AGENT_TYPE} (env: ${ENV}), skipping."
              continue
            fi

            echo ""
            echo "Processing agent type: ${AGENT_TYPE}"

            VERSIONED_PATH="${FOLDER}/releases/${VERSION}/${AGENT_TYPE}"
            LATEST_PATH="${FOLDER}/releases/latest/${AGENT_TYPE}"

            LINUX_DEB_FILE=""
            LINUX_DEB_SIZE=0
            LINUX_RPM_FILE=""
            LINUX_RPM_SIZE=0
            MACOS_PKG_FILE=""
            MACOS_PKG_SIZE=0
            WINDOWS_FILE=""
            WINDOWS_SIZE=0

            # Upload Linux (.deb, .rpm) and Windows .zip artifacts
            for FILE in "${SRC_DIR}"/*; do
              FILENAME=$(basename "${FILE}")
              FILESIZE=$(stat -c%s "${FILE}")

              case "${FILENAME}" in
                *.tar.gz) continue ;;        # tar.gz no longer published
                checksums.sha256) ;;         # always upload checksums
              esac

              echo "  Uploading: ${FILENAME} (${FILESIZE} bytes)"

              gsutil cp "${FILE}" "gs://${{ env.GCS_BUCKET }}/${VERSIONED_PATH}/${FILENAME}"
              gsutil cp "${FILE}" "gs://${{ env.GCS_BUCKET }}/${LATEST_PATH}/${FILENAME}"

              case "${FILENAME}" in
                *linux.deb)        LINUX_DEB_FILE="${FILENAME}"; LINUX_DEB_SIZE=${FILESIZE} ;;
                *linux.noarch.rpm) LINUX_RPM_FILE="${FILENAME}"; LINUX_RPM_SIZE=${FILESIZE} ;;
                *windows.zip)      WINDOWS_FILE="${FILENAME}";   WINDOWS_SIZE=${FILESIZE} ;;
              esac
            done

            # Upload macOS .pkg artifacts (from macOS build job)
            if [ -d "${PKG_DIR}" ]; then
              for FILE in "${PKG_DIR}"/*.pkg; do
                [ -f "${FILE}" ] || continue
                FILENAME=$(basename "${FILE}")
                FILESIZE=$(stat -c%s "${FILE}")

                echo "  Uploading .pkg: ${FILENAME} (${FILESIZE} bytes)"

                gsutil cp "${FILE}" "gs://${{ env.GCS_BUCKET }}/${VERSIONED_PATH}/${FILENAME}"
                gsutil cp "${FILE}" "gs://${{ env.GCS_BUCKET }}/${LATEST_PATH}/${FILENAME}"

                case "${FILENAME}" in
                  *macos.pkg) MACOS_PKG_FILE="${FILENAME}"; MACOS_PKG_SIZE=${FILESIZE} ;;
                esac
              done
            else
              echo "  No macOS .pkg artifacts found for ${AGENT_TYPE} (env: ${ENV}) — skipping."
            fi

            BASE_URL="https://storage.googleapis.com/${{ env.GCS_BUCKET }}/${VERSIONED_PATH}"

            cat > "manifest-${AGENT_TYPE}.json" << EOF
          {
            "version": "${VERSION}",
            "git_commit": "${GIT_COMMIT}",
            "released_at": "${RELEASED_AT}",
            "environment": "${FOLDER}",
            "agent_type": "${AGENT_TYPE}",
            "installers": {
              "linux-deb": {
                "filename": "${LINUX_DEB_FILE}",
                "url": "${BASE_URL}/${LINUX_DEB_FILE}",
                "size": ${LINUX_DEB_SIZE},
                "os": "linux",
                "arch": "universal",
                "format": "deb"
              },
              "linux-rpm": {
                "filename": "${LINUX_RPM_FILE}",
                "url": "${BASE_URL}/${LINUX_RPM_FILE}",
                "size": ${LINUX_RPM_SIZE},
                "os": "linux",
                "arch": "universal",
                "format": "rpm"
              },
              "macos": {
                "filename": "${MACOS_PKG_FILE}",
                "url": "${BASE_URL}/${MACOS_PKG_FILE}",
                "size": ${MACOS_PKG_SIZE},
                "os": "macos",
                "arch": "universal",
                "format": "pkg"
              },
              "windows": {
                "filename": "${WINDOWS_FILE}",
                "url": "${BASE_URL}/${WINDOWS_FILE}",
                "size": ${WINDOWS_SIZE},
                "os": "windows",
                "arch": "universal",
                "format": "zip"
              }
            }
          }
          EOF

            gsutil cp "manifest-${AGENT_TYPE}.json" \
              "gs://${{ env.GCS_BUCKET }}/${VERSIONED_PATH}/manifest.json"
            gsutil cp "manifest-${AGENT_TYPE}.json" \
              "gs://${{ env.GCS_BUCKET }}/${LATEST_PATH}/manifest.json"

            echo "  Manifest uploaded for ${AGENT_TYPE}"
          done

      - name: Build and upload CLI install scripts
        run: |
          FOLDER="${{ steps.env.outputs.folder }}"

          # Resolve the backend API base URL for this environment
          case "${FOLDER}" in
            prod) DOWNLOAD_API_BASE="https://backend-pentest.virtualsme.me" ;;
            *)    DOWNLOAD_API_BASE="https://stage-backend-pentest.virtualsme.me" ;;
          esac

          chmod +x scripts/build-cli-installer.sh
          DOWNLOAD_API_BASE="${DOWNLOAD_API_BASE}" ./scripts/build-cli-installer.sh

          # Upload to gs://{bucket}/{folder}/cli/
          # Note: the bucket uses uniform bucket-level access — public read is
          # controlled via IAM (roles/storage.objectViewer for allUsers) set once
          # in the GCP console, not per-object ACLs.
          gsutil cp dist/cli/install.sh  "gs://${{ env.GCS_BUCKET }}/${FOLDER}/cli/install.sh"
          gsutil cp dist/cli/install.ps1 "gs://${{ env.GCS_BUCKET }}/${FOLDER}/cli/install.ps1"

          echo "CLI install scripts uploaded:"
          echo "  gs://${{ env.GCS_BUCKET }}/${FOLDER}/cli/install.sh"
          echo "  gs://${{ env.GCS_BUCKET }}/${FOLDER}/cli/install.ps1"
          echo "  Backend URL baked in: ${DOWNLOAD_API_BASE}"

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ENV="${{ steps.env.outputs.environment }}"
          FOLDER="${{ steps.env.outputs.folder }}"

          echo "════════════════════════════════════════════════════"
          echo "Pentest Agent Installer Packages Uploaded to GCS"
          echo "════════════════════════════════════════════════════"
          echo ""
          echo "Environment: ${ENV}"
          echo "GCS Folder:  ${FOLDER}"
          echo "Version:     ${VERSION}"
          echo ""
          echo "GCS paths:"
          for AGENT_TYPE in network api fullstack; do
            echo "  ${AGENT_TYPE}:"
            echo "    gs://${{ env.GCS_BUCKET }}/${FOLDER}/releases/${VERSION}/${AGENT_TYPE}/"
            echo "    gs://${{ env.GCS_BUCKET }}/${FOLDER}/releases/latest/${AGENT_TYPE}/"
          done
          echo ""
          echo "Manifest URLs:"
          for AGENT_TYPE in network api fullstack; do
            echo "  ${AGENT_TYPE}: https://storage.googleapis.com/${{ env.GCS_BUCKET }}/${FOLDER}/releases/latest/${AGENT_TYPE}/manifest.json"
          done
          echo ""
          echo "CLI install scripts:"
          echo "  Linux/macOS : gs://${{ env.GCS_BUCKET }}/${FOLDER}/cli/install.sh"
          echo "  Windows     : gs://${{ env.GCS_BUCKET }}/${FOLDER}/cli/install.ps1"
