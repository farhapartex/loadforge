name: Deploy PenTestAgent Backend to GKE

on:
  push:
    branches: [stage]

env:
  # ===== GCP / Artifact Registry =====
  GCP_PROJECT_ID: virtualsme-me
  GCP_REGION: me-central2
  GAR_REGISTRY: me-central2-docker.pkg.dev

  IMAGE_PenTestAgent_Web_URI: me-central2-docker.pkg.dev/virtualsme-me/virtualsme-pentest-agent-stage/virtualsme-pentest-agent-web-stage

  # ===== GKE =====
  GKE_CLUSTER_NAME: virtualsme-stage-gke

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: recursive

      # ===== GCP AUTH =====
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker $GAR_REGISTRY --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build, tag, and push PenTestAgent images
        run: |
          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

          # PenTestAgent Web
          docker buildx build --platform linux/amd64 \
            -t $IMAGE_PenTestAgent_Web_URI:$IMAGE_TAG \
            -t $IMAGE_PenTestAgent_Web_URI:latest \
            . --push

  deploy-to-gke:
    runs-on: [self-hosted, bastion-gcp-stage]
    needs: build-and-push

    steps:
      - name: Checkout manifests repo
        uses: actions/checkout@v3
        with:
          repository: virtualfusion/virtualsme-eks
          path: gke-manifests
          token: ${{ secrets.GH_PAT }}

      # ===== PenTestAgent =====
      - name: Update and apply pentest-agent backend deployment
        run: |
          IMAGE_TAG=$(echo $GITHUB_SHA | cut -c1-7)

          sed -i "s|image: .*|image: $IMAGE_PenTestAgent_Web_URI:$IMAGE_TAG|g" \
            gke-manifests/Backend/PenTest/Agent/web-agent-deployment.yaml

          kubectl apply -f \
            gke-manifests/Backend/PenTest/Agent/web-agent-deployment.yaml
