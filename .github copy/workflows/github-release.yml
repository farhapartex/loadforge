name: GitHub Release

# Triggered by a version tag push (e.g. v1.2.3) or manually.
# Builds raw binaries for all agent types and platforms, then publishes a
# GitHub Release so the CLI install.sh can download them without authentication.
#
# GCS upload (release.yml) continues unchanged — this workflow runs alongside it.

on:
  push:
    branches:
      - main
      - stage
      - prod_gcp
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Platform endpoints baked into the binaries'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - stage
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  GO_VERSION: '1.26'
  GITHUB_REPO: 'virtualfusion/virtualsme-be-pentest-agent'

jobs:
  # ── Build binaries for each agent type ─────────────────────────────────────
  build:
    name: Build (${{ matrix.agent_type }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        agent_type: [network, api, fullstack]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ env.GO_VERSION }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-${{ env.GO_VERSION }}-

      - name: Download dependencies
        run: go mod download

      - name: Resolve version and endpoints
        id: meta
        run: |
          # Version — tag name if triggered by tag, otherwise short commit SHA
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Endpoints — match the same logic as release.yml
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [[ "${{ github.ref }}" == "refs/heads/stage" ]]; then
            ENV="stage"
          else
            ENV="prod"
          fi

          case "${ENV}" in
            stage)
              echo "api_endpoint=https://stage-backend-pentest.virtualsme.me" >> $GITHUB_OUTPUT
              echo "ws_endpoint=wss://stage-backend-pentest.virtualsme.me/api/v1/ws/agent" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "api_endpoint=https://backend-pentest.virtualsme.me" >> $GITHUB_OUTPUT
              echo "ws_endpoint=wss://backend-pentest.virtualsme.me/api/v1/ws/agent" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Build all platforms
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          GIT_COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")"
          BUILD_TIME="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          GO_VERSION="$(go version | awk '{print $3}')"
          MODULE="github.com/virtualfusion/virtualsme-be-pentest-agent"
          AGENT_TYPE="${{ matrix.agent_type }}"

          LDFLAGS="-s -w \
            -X '${MODULE}/internal/constants.Version=${VERSION}' \
            -X '${MODULE}/internal/constants.GitCommit=${GIT_COMMIT}' \
            -X '${MODULE}/internal/constants.BuildTime=${BUILD_TIME}' \
            -X '${MODULE}/internal/constants.GoVersion=${GO_VERSION}' \
            -X '${MODULE}/internal/constants.AgentType=${AGENT_TYPE}' \
            -X '${MODULE}/internal/constants.APIEndpoint=${{ steps.meta.outputs.api_endpoint }}' \
            -X '${MODULE}/internal/constants.WSEndpoint=${{ steps.meta.outputs.ws_endpoint }}'"

          mkdir -p release-binaries

          build() {
            local GOOS="$1" GOARCH="$2" LABEL="$3" EXT="${4:-}"
            local OUT="release-binaries/pentest-agent-${AGENT_TYPE}-${LABEL}-${GOARCH}${EXT}"
            echo "  → ${GOOS}/${GOARCH} → ${OUT}"
            GOOS="${GOOS}" GOARCH="${GOARCH}" CGO_ENABLED=0 \
              go build -trimpath -ldflags "${LDFLAGS}" -o "${OUT}" ./cmd/agent
          }

          build linux   amd64 linux
          build linux   arm64 linux
          build darwin  amd64 macos
          build darwin  arm64 macos
          build windows amd64 windows .exe
          build windows arm64 windows .exe

      - name: Generate checksums
        run: |
          cd release-binaries
          sha256sum pentest-agent-${{ matrix.agent_type }}-* \
            > checksums-${{ matrix.agent_type }}.sha256
          cat checksums-${{ matrix.agent_type }}.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.agent_type }}
          path: release-binaries/
          retention-days: 1

  # ── Create the GitHub Release and attach all files ──────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version
        id: meta
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(git rev-parse --short HEAD 2>/dev/null || echo "dev")
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          PRERELEASE="${{ github.event.inputs.prerelease }}"
          if [ -z "${PRERELEASE}" ]; then PRERELEASE="false"; fi
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-binaries
          merge-multiple: true

      - name: Build CLI install scripts
        run: |
          chmod +x scripts/build-cli-installer.sh
          ./scripts/build-cli-installer.sh
          cp dist/cli/install.sh  release-binaries/install.sh
          cp dist/cli/install.ps1 release-binaries/install.ps1

      - name: List release files
        run: |
          echo "Files to be attached to the GitHub Release:"
          ls -lh release-binaries/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          PRERELEASE_FLAG=""
          if [ "${{ steps.meta.outputs.prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          cat > release-notes.md << 'RELEASE_NOTES_EOF'
          ## VirtualSME Pentest Agent

          ### CLI Installation (Linux / macOS)
          ```bash
          curl -fsSL https://github.com/virtualfusion/virtualsme-be-pentest-agent/releases/latest/download/install.sh | sudo bash
          ```

          Then run the setup wizard:
          ```bash
          sudo pentest-agent --setup
          ```

          ### CLI Installation (Windows — elevated PowerShell)
          ```powershell
          Invoke-Expression (Invoke-WebRequest -Uri 'https://github.com/virtualfusion/virtualsme-be-pentest-agent/releases/latest/download/install.ps1' -UseBasicParsing).Content
          ```

          ### Manual download
          Pick the binary for your agent type, OS, and architecture from the assets below.
          RELEASE_NOTES_EOF

          gh release create "${VERSION}" \
            --repo "${{ env.GITHUB_REPO }}" \
            --title "Pentest Agent ${VERSION}" \
            --notes-file release-notes.md \
            ${PRERELEASE_FLAG} \
            release-binaries/*
