site_name: LoadForge
site_description: Developer-first HTTP load testing — run from the terminal or a browser-based UI
site_url: https://loadforge.readthedocs.io
repo_url: https://github.com/farhapartex/loadforge
repo_name: farhapartex/loadforge
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Web UI: web-ui.md
  - Uninstallation: uninstallation.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

plugins:
  - search
